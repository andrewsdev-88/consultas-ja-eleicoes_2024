        const gridOptions = {
            columnDefs: [
                { field: "municipio", headerName: "Município", sortable: true, filter: true, pinned: 'left' },
                { field: "nome", headerName: "Candidato", sortable: true, filter: true, width: 250 },
                { field: "partido", headerName: "Partido", sortable: true, filter: true, width: 130 },
                { field: "numero", headerName: "Nº", sortable: true, width: 100 },
                { field: "votos", headerName: "Votos", sortable: true, filter: 'agNumberColumnFilter', width: 130,
                   valueFormatter: params => params.value.toLocaleString('pt-BR') },
                { field: "situacao", headerName: "Situação Final", sortable: true, filter: true, 
                   cellStyle: params => {
                       if (params.value.includes('ELEITO')) return {color: 'white', backgroundColor: '#28a745', fontWeight: 'bold'};
                       if (params.value.includes('SUPLENTE')) return {color: 'black', backgroundColor: '#ffc107', fontWeight: 'bold'};
                       return null;
                   }
                }
            ],
            rowData: rowData,
            pagination: true,
            paginationPageSize: 25,
            defaultColDef: { resizable: true, flex: 1, filter: true },
            onFirstDataRendered: params => {
                updateStats();
            },
            onFilterChanged: params => {
                updateStats();
            }
        };

        // Inicializar municípios
        const muns = [...new Set(rowData.map(r => r.municipio))].sort();
        const sel = document.getElementById('filter-municipio');
        muns.forEach(m => {
            const o = document.createElement('option');
            o.value = m; o.innerHTML = m; sel.appendChild(o);
        });

        function updateStats() {
            const rows = [];
            gridOptions.api.forEachNodeAfterFilter(node => rows.push(node.data));
            
            document.getElementById('stat-total-cand').innerText = rows.length;
            document.getElementById('stat-total-votos').innerText = rows.reduce((s, r) => s + r.votos, 0).toLocaleString('pt-BR');
            document.getElementById('stat-total-cidades').innerText = [...new Set(rows.map(r => r.municipio))].length;
            document.getElementById('stat-total-eleitos').innerText = rows.filter(r => r.situacao.includes('ELEITO')).length;
        }

        const gridDiv = document.querySelector('#myGrid');
        new agGrid.Grid(gridDiv, gridOptions);

        function onFilterChanged() {
            const mun = document.getElementById('filter-municipio').value;
            const sit = document.getElementById('filter-situacao').value;
            const text = document.getElementById('filter-text').value.toLowerCase();

            gridOptions.api.setQuickFilter(text);
            
            const filterModel = {};
            if (mun) filterModel.municipio = { filterType: 'text', type: 'equals', filter: mun };
            if (sit) filterModel.situacao = { filterType: 'text', type: 'contains', filter: sit };
            
            gridOptions.api.setFilterModel(filterModel);
        }

        function resetFilters() {
            document.getElementById('filter-municipio').value = "";
            document.getElementById('filter-situacao').value = "";
            document.getElementById('filter-text').value = "";
            gridOptions.api.setFilterModel(null);
            gridOptions.api.setQuickFilter("");
        }
    </script>
